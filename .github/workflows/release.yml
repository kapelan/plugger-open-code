name: Release

# Fires when a tag matching `v*` is pushed (e.g. `v0.1.0`, `v1.2.3-rc.1`).
# Recommended flow: `npm version <bump> && git push --follow-tags` locally —
# that produces the tag this workflow listens for.
on:
  push:
    tags:
      - 'v*'

# Allow only one release run at a time, but don't cancel mid-flight: a
# half-published version on npm is annoying to clean up.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance (--provenance)
    steps:
      - uses: actions/checkout@v4
        with:
          # `npm publish --provenance` needs the full commit ref.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # We use Node's npm CLI for the publish step itself (Bun doesn't
      # support `--provenance` yet). Install/build/test stays on Bun.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Guard: tag must match package.json version. Without this a hand-rolled
      # `git tag v9.9.9` would happily ship whatever is in package.json.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      # OpenCode's plugin spec resolver treats `<pkg>/<subpath>@<ver>` as a
      # single npm package name. So the TUI lives in a sibling package
      # (`@sulesky/opencode-plugger-tui`) that depends on the main one.
      # Both publish from the same git tag, same version.
      - name: Publish server package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Swap in TUI package.json
        run: |
          # Save the server package.json for restoration after publish.
          cp package.json package.server.json.bak
          # Template the version into package.tui.json (both the `version`
          # field and the peerDependency on the server package).
          VERSION="$(node -p "require('./package.json').version")"
          node -e "
            const fs = require('fs');
            const tui = JSON.parse(fs.readFileSync('package.tui.json', 'utf-8'));
            delete tui.\$comment;
            delete tui.dependencies.\$comment_dependencies;
            tui.version = '$VERSION';
            tui.dependencies['@sulesky/opencode-plugger'] = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(tui, null, 2) + '\n');
          "
          echo '--- TUI package.json ---'
          cat package.json

      - name: Publish TUI package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Restore server package.json
        if: always()
        run: mv package.server.json.bak package.json
