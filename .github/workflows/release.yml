name: Release

# Fires when a tag matching `v*` is pushed (e.g. `v0.1.0`, `v1.2.3-rc.1`).
# Recommended flow: `npm version <bump> && git push --follow-tags` locally —
# that produces the tag this workflow listens for.
on:
  push:
    tags:
      - 'v*'

# Allow only one release run at a time, but don't cancel mid-flight: a
# half-published version on npm is annoying to clean up.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance (--provenance)
    steps:
      - uses: actions/checkout@v4
        with:
          # `npm publish --provenance` needs the full commit ref, not a shallow clone.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # We use Node's npm CLI for the publish step itself (Bun doesn't
      # support `--provenance` yet). Install/build/test stays on Bun.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Guard against publishing a tag whose code doesn't match its declared
      # version. `npm version` keeps these in sync locally; this catches the
      # case where someone tags by hand and forgets to bump.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
